use_default_settings: true

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "change-this-local-only-key"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "zh-CN"
  formats:
    - html
    - json

ui:
  static_use_hash: true

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0
  pool_connections: 20
  pool_maxsize: 50

general:
  debug: false
  instance_name: "Securities News SearXNG"
